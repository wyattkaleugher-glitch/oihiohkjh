name: JJKPlugin
version: 1.0.0
main: me.username.jjkplugin.JJKPlugin
api-version: '1.21'
description: Command-driven Jujutsu Kaisen combat core built natively for Paper 1.21.11.
authors: 'CrimsonWarpedCraft'

commands:
  jjk:
    description: Master command for executing Cursed Techniques.
    usage: /jjk <ability1|ability2|domain|shadowinv>
    aliases: [cast, attack]
  jjkadmin:
    description: Admin commands to manage grades and techniques.
    permission: jjk.admin
    usage: /jjkadmin <setgrade|setce|givescroll> <player> [value]

permissions:
  jjk.admin:
    description: Master admin access.
    default: op 
