name: JJKPlugin
version: 1.0.0
main: com.crimsonwarpedcraft.exampleplugin.ExamplePlugin
api-version: '1.20'
authors:
  - CrimsonWarpedCraft
description: A complete Jujutsu Kaisen combat technique system with dynamic metadata shard drops.

commands:
  jjk:
    description: Master command suite for jujutsu innate styles.
    usage: /jjk <ability1|ability2|domain|setclass|reload|givece|setmaxce>

# =====================================================================
# ADMINISTRATIVE AND PLAYER PERMISSION SECTIONS
# =====================================================================
permissions:
  jjk.use:
    description: Allows basic access to cast abilities and pick character classes.
    default: true
  jjk.admin:
    description: Administrative override section. Allows reloading configurations, giving CE, and setting max limits.
    default: op
