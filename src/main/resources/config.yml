# Damage values: 2.0 = 1 Heart
# Levels: 0 = Level I, 1 = Level II, 2 = Level III, etc.

kits:
  gojo:
    blue-damage: 4.0
    red-damage: 8.0
    
  sukuna:
    cleave-damage: 10.0
    dismantle-damage: 6.0
    
  yuji:
    divergent-damage: 6.0
    black-flash-damage: 20.0
    
  mahito:
    heal-level: 2 # Regeneration III
    repel-damage: 8.0
    
  inumaki:
    dont-move-damage: 3.0
    blast-damage: 7.0
    
  megumi:
    mahoraga:
      health: 200.0        # 100 Hearts
      speed-level: 3       # Speed IV
      strength-level: 1    # Strength II
      lifespan-seconds: 60 # How long he stays before despawning
      
# ==========================================
# Domain Settings
# ==========================================
domains:
  radius: 8
  duration-ticks: 400      # 20 seconds
  unbreakable: true        # Prevents block breaking inside
