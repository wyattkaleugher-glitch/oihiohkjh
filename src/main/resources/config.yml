      max-ce: 3000
      display-name: "§eGrade 1 Sorcerer"
    special_grade:
      max-ce: 5000
      display-name: "§cSpecial Grade Sorcerer"
  
  hud:
    # Action bar color configuration
    bar-color: "AQUA"
    display-format: "§b|||||||||| %current% / %max% CE"

# Global settings for Domain Expansions
domains:
  universal:
    activation-cost: 500
    duration-ticks: 400 # 20 seconds exactly in 1.21.11 tick engines
    burnout-duration-ticks: 300 # 15 seconds of burnout backlash
    radius: 15
    # Universal combat buffs injected on creation
    buffs:
      strength-level: 3
      resistance-level: 2
      speed-level: 2
  
  # Structural visual particle assignments
  particles:
    barrier-type: "TRIAL_SPAWNER_DETECTION_OMINOUS"
    sukuna-open-shrine: "BLOCK_MARKER"

